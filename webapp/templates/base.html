<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Demo{% endblock %}</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    nav a { margin-right: 1rem; }
    textarea, select, input[type=text] { width: 100%; font-family: inherit; font-size: 1rem; padding: 0.4rem; box-sizing: border-box; }
    pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
    .error { color: #b00020; }
    button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
    .report { overflow-x: auto; }
    .report table { border-collapse: collapse; margin-bottom: 1.5rem; width: 100%; }
    .report th, .report td { border: 1px solid #ccc; padding: 0.4rem 0.6rem; text-align: left; }
    .report th { background: #f4f4f4; }
    .report blockquote { margin: 0.5rem 0; padding-left: 1rem; border-left: 3px solid #ccc; color: #444; }
    .hint, .muted { color: #666; font-size: 0.9rem; }
    fieldset { border: 1px solid #ccc; border-radius: 4px; margin: 0.75rem 0; padding: 0.5rem 0.75rem; }
    .checkbox-row { display: block; font-weight: normal; margin: 0.25rem 0; }
    .checkbox-row input { width: auto; }
    input[type=number], input[type=file] { width: 100%; box-sizing: border-box; padding: 0.4rem; margin-bottom: 0.5rem; }
    label { font-weight: 600; display: block; margin-top: 0.5rem; }
    .table-scroll { overflow-x: auto; }
    table { border-collapse: collapse; margin: 0.5rem 0 1.5rem; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 0.35rem 0.6rem; text-align: left; }
    th { background: #f4f4f4; }
    .eval-category { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; }
    .critique-run { margin: 1.5rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 4px; background: #fafafa; }
    .critique-run h2, .critique-run h3 { margin-top: 0; }
    .run-meta { margin: 1rem 0; }
    .run-meta dt { font-weight: 600; }
    .run-meta dd { margin: 0 0 0.75rem; color: #444; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Ask the Assistant</a>
    <a href="/policies">Policy Comparison</a>
    <a href="/test">Guardrail Evaluation</a>
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
